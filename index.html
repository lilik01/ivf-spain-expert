<body>

<div class="chat-container">
    <div class="chat-header">
        <div id="admin-trigger" class="header-left cursor-pointer select-none">
            <svg class="logo-svg" viewBox="0 0 100 100">
                <path d="M50 10 A40 40 0 1 1 20 25" fill="none" stroke="#D4AF37" stroke-width="6" stroke-linecap="round"></path>
                <circle cx="40" cy="48" r="9" fill="#22c55e"></circle>
                <circle cx="60" cy="48" r="9" fill="#22c55e"></circle>
                <path d="M42 68 A10 10 0 0 0 58 68" fill="none" stroke="#D4AF37" stroke-width="4" stroke-linecap="round"></path>
            </svg>
            <span class="font-bold text-sm">IVF-Spain Expert</span>
        </div>
        <select id="lang-select" class="lang-select">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="zh">中文</option>
            <option value="uk">Українська</option>
            <option value="mo">Română</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
            <option value="ar">العربية</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <!-- АДМИН ПАНЕЛЬ -->
    <div id="admin-panel" style="display: none;">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-ivf-navy">Управление Базой Источников</h2>
            <button class="text-xl" onclick="document.getElementById('admin-panel').style.display='none'">✕</button>
        </div>
        <div id="admin-msg" class="admin-status"></div>
        <p class="text-[10px] text-gray-500 mb-2 italic">Вставьте текст из Google Документа ниже. Затем нажмите кнопку генерации кода.</p>
        <textarea id="kb-editor" class="flex-1 w-full p-4 border rounded-xl text-xs mb-4 font-mono leading-relaxed bg-slate-50 outline-none focus:border-ivf-gold" placeholder="Вставьте данные здесь..."></textarea>
        <button id="gen-code-btn" class="bg-blue-900 text-white py-3 rounded-xl font-bold mb-2 active:scale-95 transition-transform">СГЕНЕРИРОВАТЬ КОД ДЛЯ GITHUB</button>
        <div id="code-output-container" class="hidden flex-1 flex flex-col">
            <p class="text-[10px] text-red-600 font-bold mb-1 uppercase">Скопируйте всё из поля ниже и вставьте в файл index.html на GitHub:</p>
            <textarea id="code-output" class="flex-1 w-full p-2 border bg-gray-50 rounded text-[9px] font-mono" readonly="" onclick="this.select()"></textarea>
        </div>
    </div>

    <!-- МОДАЛ ПАРОЛЯ -->
    <div id="password-modal" style="display: none;">
        <div class="bg-white p-6 rounded-3xl w-64 text-center shadow-2xl">
            <h3 class="text-sm font-bold mb-4 text-ivf-navy">Доступ к системе</h3>
            <input type="password" id="admin-pass-input" class="w-full p-3 border rounded-xl mb-4 text-center outline-none focus:border-ivf-gold" placeholder="****">
            <button id="admin-login-btn" class="w-full bg-blue-900 text-white py-2 rounded-xl font-semibold">Войти</button>
        </div>
    </div>

    <div id="messages-area" class="messages-area"></div></div><div id="suggestions-container"><button class="suggestion-btn">Первая попытка ЭКО</button><button class="suggestion-btn">Были неудачи</button><button class="suggestion-btn">Почему Испания?</button><button class="suggestion-btn">Узнать стоимость</button></div></div>
    <div id="typing">Дженни изучает вопрос...</div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="user-input" placeholder="Введите ваш вопрос..." autocomplete="off">
            <button id="send-btn">➤</button>
        </div>
    </div>
</div>

<script type="module">
    // ============================================================
    // БАЗА ЗНАНИЙ (СЮДА БУДЕТ ВПИСАН ВАШ ТЕКСТ)
    // ============================================================
    const knowledgeBase = `
        Клиника IVF-Spain является ведущим европейским центром репродуктивной медицины.
        Специализация: сложные случаи ЭКО, донорство яйцеклеток, генетическая диагностика.
        Испания является лидером в области ЭКО благодаря передовому законодательству.
        Видео Medicare: https://www.youtube.com/watch?v=22
    `;

    // АКТУАЛЬНЫЙ API КЛЮЧ ЛИЛИАН
    const apiKey = "AIzaSyBFm7B5zqVTqmylsamSJJWsZ-8ZbqVh-I0"; 
    // ============================================================

    let currentLang = 'ru';

    const uiStrings = {
        en: { placeholder: "Your question...", welcome: "Hello. I am Jenny, your expert. Do you plan your first attempt or have experience?\n\nSUGGESTIONS: [First IVF attempt], [Previous failures], [Why Spain?], [Costs]" },
        ru: { placeholder: "Введите ваш вопрос...", welcome: "Здравствуйте. Я Дженни, ваш независимый эксперт по технологиям клиники IVF-Spain. Вы планируете первую попытку ЭКО или у вас уже был опыт?\n\nSUGGESTIONS: [Первая попытка ЭКО], [Были неудачи], [Почему Испания?], [Узнать стоимость]" },
        es: { placeholder: "Tu pregunta...", welcome: "Hola. Soy Jenny. ¿Planea su primer intento?\n\nSUGGESTIONS: [Primer intento], [Fallos anteriores], [¿Por qué España?], [Costes]" },
        uk: { placeholder: "Ваше питання...", welcome: "Добрий день. Я Дженни. Ви плануєте першу спробу чи мали досвід?\n\nSUGGESTIONS: [Перша спроба], [Були невдачі], [Чому Іспанія?], [Вартість]" }
    };

    function addMessage(text, isUser = false, isError = false) {
        const area = document.getElementById('messages-area');
        const oldSuggs = document.getElementById('suggestions-container');
        if (oldSuggs) oldSuggs.remove();

        const msgDiv = document.createElement('div');
        msgDiv.className = isError ? 'error-box' : `message ${isUser ? 'message-user' : 'message-bot shadow-sm'}`;
        
        let displayBody = text;
        let suggests = [];
        if (!isUser && !isError) {
            const matchSugg = text.match(/SUGGESTIONS: (.*)/);
            if (matchSugg) {
                const suggPart = matchSugg[1];
                suggests = [...suggPart.matchAll(/\[(.*?)\]/g)].map(m => m[1]);
                displayBody = text.replace(/SUGGESTIONS: .*/, '');
            }
        }

        const textContainer = document.createElement('div');
        textContainer.innerHTML = displayBody.replace(/\n/g, '<br>').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
        msgDiv.appendChild(textContainer);
        
        if (!isUser && !isError) {
            const ytRegex = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/g;
            const matches = [...text.matchAll(ytRegex)];
            const ytIds = [...new Set(matches.map(m => m[1]))];
            
            if (ytIds.length > 0) {
                const videoBlock = document.createElement('div');
                videoBlock.className = 'video-attachments';
                ytIds.forEach(id => {
                    const card = document.createElement('div');
                    card.className = 'yt-card';
                    card.innerHTML = `
                        <div class="yt-thumb" style="background-image:url('https://img.youtube.com/vi/${id}/hqdefault.jpg')">
                            <div class="play-btn">▶</div>
                        </div>
                        <div class="p-2 text-[10px] text-gray-500 bg-gray-50 text-center uppercase font-bold">Видео-материал</div>`;
                    card.onclick = () => window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
                    videoBlock.appendChild(card);
                });
                msgDiv.appendChild(videoBlock);
            }
        }

        area.appendChild(msgDiv);

        if (suggests.length > 0) {
            const suggDiv = document.createElement('div');
            suggDiv.id = 'suggestions-container';
            suggests.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.innerText = s;
                btn.onclick = () => { document.getElementById('user-input').value = s; handleSend(); };
                suggDiv.appendChild(btn);
            });
            area.appendChild(suggDiv);
        }

        if (isUser) {
            msgDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
            const userMsgs = area.querySelectorAll('.message-user');
            if (userMsgs.length > 0) {
                userMsgs[userMsgs.length - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                msgDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
    }

    async function callGemini(query) {
        // Используем самую стабильную модель для этого окружения
        const model = "gemini-2.5-flash-preview-09-2025";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
        
        const payload = {
            contents: [{ 
                parts: [{ 
                    text: `Ты Дженни, независимый медицинский эксперт IVF-Spain. 
                          БАЗА ДАННЫХ: ${knowledgeBase}. 
                          ПРАВИЛО: Отвечай строго по фактам из базы. Без приветствий. 
                          Ссылки YouTube только в самом конце. 
                          Язык: ${currentLang}. 
                          Вопрос: ${query}` 
                }] 
            }]
        };

        const response = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error?.message || "Ошибка системы");
        }
        const data = await response.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "Нет ответа.";
    }

    async function handleSend() {
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if (!val) return;
        addMessage(val, true);
        input.value = '';
        document.getElementById('typing').style.display = 'block';
        try {
            const reply = await callGemini(val);
            addMessage(reply);
        } catch (e) { addMessage(`Ошибка доступа: ${e.message}`, false, true); }
        document.getElementById('typing').style.display = 'none';
    }

    // АДМИНКА
    document.getElementById('admin-trigger').ondblclick = () => {
        document.getElementById('password-modal').style.display = 'flex';
    };

    document.getElementById('admin-login-btn').onclick = () => {
        if (document.getElementById('admin-pass-input').value === "1324") {
            document.getElementById('password-modal').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'flex';
            document.getElementById('kb-editor').value = knowledgeBase.trim();
        } else {
            const s = document.getElementById('admin-msg');
            s.innerText = "Неверный пароль!";
            s.style.display = "block";
            s.style.background = "#fee2e2";
            s.style.color = "#991b1b";
        }
    };

    document.getElementById('gen-code-btn').onclick = () => {
        const newKB = document.getElementById('kb-editor').value;
        
        // Получаем чистый HTML текущего файла
        let html = document.documentElement.outerHTML;
        
        // Находим место, где вписана база знаний, и заменяем её
        const startMarker = "
