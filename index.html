<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVF-Spain Expert Service</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap');
        :root { --ivf-navy: #002D45; --ivf-gold: #D4AF37; }
        body { font-family: 'Inter', sans-serif; background-color: #f1f5f9; margin: 0; }
        
        .chat-container { height: 100vh; max-width: 500px; margin: 0 auto; display: flex; flex-direction: column; background: white; position: relative; box-shadow: 0 0 40px rgba(0,0,0,0.1); }
        @media (min-height: 600px) { .chat-container { height: calc(100vh - 40px); margin: 20px auto; border-radius: 20px; overflow: hidden; } }

        .chat-header { background: var(--ivf-navy); padding: 16px 20px; color: white; border-bottom: 3px solid var(--ivf-gold); display: flex; align-items: center; justify-content: space-between; z-index: 10; }
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo-svg { width: 38px; height: 38px; flex-shrink: 0; }
        
        .lang-select { background: rgba(255,255,255,0.1); color: white; border: 1px solid rgba(255,255,255,0.2); border-radius: 6px; padding: 4px; font-size: 11px; font-weight: 600; cursor: pointer; outline: none; }
        .lang-select option { background: var(--ivf-navy); color: white; }

        .messages-area { flex: 1; padding: 20px; overflow-y: auto; display: flex; flex-direction: column; gap: 16px; background: #ffffff; scroll-behavior: smooth; }
        .message { max-width: 85%; padding: 12px 16px; border-radius: 18px; font-size: 14px; line-height: 1.5; word-wrap: break-word; position: relative; scroll-margin-top: 20px; }
        .message-bot { background: #f1f5f9; color: #1e293b; align-self: flex-start; border-bottom-left-radius: 4px; border: 1px solid #e2e8f0; }
        .message-user { background: var(--ivf-navy); color: white; align-self: flex-end; border-bottom-right-radius: 4px; }
        
        .message a { color: #2563eb !important; text-decoration: underline !important; font-weight: 600; }
        .message-user a { color: var(--ivf-gold) !important; }

        .video-attachments { margin-top: 15px; padding-top: 10px; border-top: 1px dashed #cbd5e1; width: 100%; }
        .yt-card { margin-bottom: 12px; border-radius: 12px; overflow: hidden; border: 1px solid #e2e8f0; cursor: pointer; background: #000; }
        .yt-thumb { width: 100%; aspect-ratio: 16/9; background-size: cover; background-position: center; display: flex; align-items: center; justify-content: center; }
        .play-btn { width: 40px; height: 40px; background: rgba(255,0,0,0.9); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; }

        #suggestions-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; width: 100%; padding-bottom: 10px; }
        .suggestion-btn { background: white; color: var(--ivf-navy); border: 1.5px solid var(--ivf-navy); padding: 8px 10px; border-radius: 10px; font-size: 11px; cursor: pointer; font-weight: 600; text-align: center; transition: 0.2s; }
        .suggestion-btn:hover { background: var(--ivf-gold); color: white; border-color: var(--ivf-gold); }

        .input-area { padding: 14px 20px; background: #f8fafc; border-top: 1px solid #e2e8f0; }
        .input-row { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 2px solid #cbd5e1; border-radius: 12px; outline: none; font-size: 15px; }
        #send-btn { background: var(--ivf-navy); color: white; padding: 0 16px; border-radius: 12px; cursor: pointer; }
        #typing { display: none; padding: 4px 20px; font-size: 11px; color: var(--ivf-navy); font-weight: 600; }

        /* АДМИН ПАНЕЛЬ */
        #admin-panel { position: absolute; inset: 0; background: white; z-index: 100; display: none; flex-direction: column; padding: 20px; }
        #password-modal { position: absolute; inset: 0; background: rgba(0,0,0,0.7); z-index: 200; display: none; align-items: center; justify-content: center; }
        .admin-status { font-size: 11px; padding: 10px; border-radius: 8px; margin-bottom: 10px; display: none; }
    </style>
</head>
<body>

<div class="chat-container">
    <div class="chat-header">
        <div id="admin-trigger" class="header-left cursor-pointer select-none">
            <svg class="logo-svg" viewBox="0 0 100 100">
                <path d="M50 10 A40 40 0 1 1 20 25" fill="none" stroke="#D4AF37" stroke-width="6" stroke-linecap="round"/>
                <circle cx="40" cy="48" r="9" fill="#22c55e"/>
                <circle cx="60" cy="48" r="9" fill="#22c55e"/>
                <path d="M42 68 A10 10 0 0 0 58 68" fill="none" stroke="#D4AF37" stroke-width="4" stroke-linecap="round"/>
            </svg>
            <span class="font-bold text-sm">IVF-Spain Expert</span>
        </div>
        <select id="lang-select" class="lang-select">
            <option value="ru">Русский</option>
            <option value="en">English</option>
            <option value="es">Español</option>
            <option value="zh">中文</option>
            <option value="uk">Українська</option>
            <option value="mo">Română</option>
            <option value="fr">Français</option>
            <option value="de">Deutsch</option>
            <option value="it">Italiano</option>
            <option value="pt">Português</option>
            <option value="ar">العربية</option>
            <option value="ja">日本語</option>
        </select>
    </div>

    <!-- АДМИН ПАНЕЛЬ -->
    <div id="admin-panel">
        <div class="flex justify-between items-center mb-4">
            <h2 class="font-bold text-ivf-navy">Локальная База Знаний</h2>
            <button class="text-xl" onclick="document.getElementById('admin-panel').style.display='none'">✕</button>
        </div>
        <div id="admin-msg" class="admin-status"></div>
        <p class="text-[10px] text-gray-500 mb-2 italic">Отредактируйте текст ниже и нажмите кнопку генерации.</p>
        <textarea id="kb-editor" class="flex-1 w-full p-4 border rounded-xl text-xs mb-4 font-mono leading-relaxed bg-slate-50" placeholder="Вставьте данные здесь..."></textarea>
        <button id="gen-code-btn" class="bg-blue-900 text-white py-3 rounded-xl font-bold mb-2 active:scale-95 transition-transform">ГЕНЕРИРОВАТЬ КОД ДЛЯ GITHUB</button>
        <div id="code-output-container" class="hidden flex-1 flex flex-col">
            <p class="text-[10px] text-red-600 font-bold mb-1 uppercase">Скопируйте всё из поля ниже и замените код на GitHub:</p>
            <textarea id="code-output" class="flex-1 w-full p-2 border bg-gray-50 rounded text-[9px] font-mono" readonly onclick="this.select()"></textarea>
        </div>
    </div>

    <!-- МОДАЛ ПАРОЛЯ -->
    <div id="password-modal">
        <div class="bg-white p-6 rounded-3xl w-64 text-center shadow-2xl">
            <h3 class="text-sm font-bold mb-4 text-ivf-navy">Пароль Админа</h3>
            <input type="password" id="admin-pass-input" class="w-full p-3 border rounded-xl mb-4 text-center outline-none focus:border-ivf-gold" placeholder="****">
            <button id="admin-login-btn" class="w-full bg-blue-900 text-white py-2 rounded-xl font-semibold">Войти</button>
        </div>
    </div>

    <div id="messages-area" class="messages-area"></div>
    <div id="typing">Дженни анализирует данные...</div>

    <div class="input-area">
        <div class="input-row">
            <input type="text" id="user-input" placeholder="Введите ваш вопрос..." autocomplete="off">
            <button id="send-btn">➤</button>
        </div>
    </div>
</div>

<script type="module">
    // ============================================================
    // БАЗА ЗНАНИЙ (СЮДА ГЕНЕРАТОР ВПИШЕТ ВАШ ТЕКСТ)
    // ============================================================
    const knowledgeBase = `
        Клиника IVF-Spain является ведущим европейским центром репродуктивной медицины.
        Специализация: сложные случаи ЭКО, донорство яйцеклеток, генетическая диагностика.
        Испания является лидером в области ЭКО благодаря передовому законодательству.
        Видео Medicare: https://www.youtube.com/watch?v=22
    `;

    // АКТУАЛЬНЫЙ API КЛЮЧ
    const apiKey = "AIzaSyBFm7B5zqVTqmylsamSJJWsZ-8ZbqVh-I0"; 
    // ============================================================

    let currentLang = 'ru';

    const uiStrings = {
        en: { placeholder: "Your question...", welcome: "Hello. I am Jenny, your expert. Do you plan your first attempt or have experience?\n\nSUGGESTIONS: [First IVF attempt], [Previous failures], [Why Spain?], [Costs]" },
        ru: { placeholder: "Введите ваш вопрос...", welcome: "Здравствуйте. Я Дженни, ваш независимый эксперт по технологиям клиники IVF-Spain. Вы планируете первую попытку ЭКО или у вас уже был опыт?\n\nSUGGESTIONS: [Первая попытка ЭКО], [Были неудачи], [Почему Испания?], [Узнать стоимость]" },
        es: { placeholder: "Tu pregunta...", welcome: "Hola. Soy Jenny. ¿Planea su primer intento?\n\nSUGGESTIONS: [Primer intento], [Fallos anteriores], [¿Por qué España?], [Costes]" },
        uk: { placeholder: "Ваше питання...", welcome: "Добрий день. Я Дженни. Ви плануєте першу спробу чи мали досвід?\n\nSUGGESTIONS: [Перша спроба], [Були невдачі], [Чому Іспанія?], [Вартість]" }
    };

    function addMessage(text, isUser = false, isError = false) {
        const area = document.getElementById('messages-area');
        const oldSuggs = document.getElementById('suggestions-container');
        if (oldSuggs) oldSuggs.remove();

        const msgDiv = document.createElement('div');
        msgDiv.className = isError ? 'error-box' : `message ${isUser ? 'message-user' : 'message-bot shadow-sm'}`;
        
        let displayBody = text;
        let suggests = [];
        if (!isUser && !isError) {
            const matchSugg = text.match(/SUGGESTIONS: (.*)/);
            if (matchSugg) {
                const suggPart = matchSugg[1];
                suggests = [...suggPart.matchAll(/\[(.*?)\]/g)].map(m => m[1]);
                displayBody = text.replace(/SUGGESTIONS: .*/, '');
            }
        }

        const textContainer = document.createElement('div');
        textContainer.innerHTML = displayBody.replace(/\n/g, '<br>').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
        msgDiv.appendChild(textContainer);
        
        if (!isUser && !isError) {
            const ytRegex = /(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})/g;
            const ytIds = [...new Set([...text.matchAll(ytRegex)].map(m => m[1]))];
            if (ytIds.length > 0) {
                const videoBlock = document.createElement('div');
                videoBlock.className = 'video-attachments';
                ytIds.forEach(id => {
                    const card = document.createElement('div');
                    card.className = 'yt-card';
                    card.innerHTML = `<div class="yt-thumb" style="background-image:url('https://img.youtube.com/vi/${id}/hqdefault.jpg')"><div class="play-btn">▶</div></div><div class="p-2 text-[10px] text-gray-500 bg-gray-50 text-center uppercase font-bold">Видео-материал</div>`;
                    card.onclick = () => window.open(`https://www.youtube.com/watch?v=${id}`, '_blank');
                    videoBlock.appendChild(card);
                });
                msgDiv.appendChild(videoBlock);
            }
        }

        area.appendChild(msgDiv);

        if (suggests.length > 0) {
            const suggDiv = document.createElement('div');
            suggDiv.id = 'suggestions-container';
            suggests.forEach(s => {
                const btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.innerText = s;
                btn.onclick = () => { document.getElementById('user-input').value = s; handleSend(); };
                suggDiv.appendChild(btn);
            });
            area.appendChild(suggDiv);
        }

        if (isUser) {
            msgDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
            const userMsgs = area.querySelectorAll('.message-user');
            if (userMsgs.length > 0) {
                userMsgs[userMsgs.length - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });
            } else {
                msgDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
    }

    async function callGemini(query) {
        const model = "gemini-2.5-flash-preview-09-2025";
        const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent?key=${apiKey}`;
        
        const payload = {
            contents: [{ parts: [{ text: `Ты Дженни, эксперт IVF-Spain. База: ${knowledgeBase}. ПРАВИЛО: Без приветствий. Видео YouTube только в конце. Язык: ${currentLang}. Вопрос: ${query}` }] }]
        };

        const response = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        
        if (!response.ok) {
            const err = await response.json();
            throw new Error(err.error?.message || "Ошибка API");
        }
        const data = await response.json();
        return data.candidates?.[0]?.content?.parts?.[0]?.text || "Нет ответа.";
    }

    async function handleSend() {
        const input = document.getElementById('user-input');
        const val = input.value.trim();
        if (!val) return;
        addMessage(val, true);
        input.value = '';
        document.getElementById('typing').style.display = 'block';
        try {
            const reply = await callGemini(val);
            addMessage(reply);
        } catch (e) { addMessage(`Ошибка: ${e.message}`, false, true); }
        document.getElementById('typing').style.display = 'none';
    }

    // АДМИНКА
    document.getElementById('admin-trigger').ondblclick = () => {
        document.getElementById('password-modal').style.display = 'flex';
    };

    document.getElementById('admin-login-btn').onclick = () => {
        if (document.getElementById('admin-pass-input').value === "1324") {
            document.getElementById('password-modal').style.display = 'none';
            document.getElementById('admin-panel').style.display = 'flex';
            document.getElementById('kb-editor').value = knowledgeBase.trim();
        } else {
            const s = document.getElementById('admin-msg');
            s.innerText = "Неверный пароль!";
            s.style.display = "block";
            s.style.background = "#fee2e2";
            s.style.color = "#991b1b";
        }
    };

    document.getElementById('gen-code-btn').onclick = () => {
        const newKB = document.getElementById('kb-editor').value;
        const currentHTML = document.documentElement.outerHTML;
        
        const startMarker = "const knowledgeBase = `";
        const endMarker = "`;";
        
        const parts = currentHTML.split(startMarker);
        if (parts.length < 2) return;
        const secondPart = parts[1].split(endMarker);
        
        const finalCode = parts[0] + startMarker + "\n        " + newKB + "\n    " + endMarker + secondPart.slice(1).join(endMarker);
        
        document.getElementById('code-output-container').classList.remove('hidden');
        document.getElementById('code-output').value = "<!DOCTYPE html>\n" + finalCode;
        
        const s = document.getElementById('admin-msg');
        s.innerText = "Код успешно сгенерирован! Скопируйте его ниже.";
        s.style.display = "block";
        s.style.background = "#dcfce7";
        s.style.color = "#166534";
    };

    window.setLanguage = (lang) => {
        currentLang = lang;
        const s = uiStrings[lang] || uiStrings['ru'];
        document.getElementById('user-input').placeholder = s.placeholder;
        document.getElementById('messages-area').innerHTML = '';
        addMessage(s.welcome);
    };

    document.getElementById('send-btn').onclick = handleSend;
    document.getElementById('user-input').onkeypress = (e) => e.key === 'Enter' && handleSend();
    document.getElementById('lang-select').onchange = (e) => window.setLanguage(e.target.value);

    window.onload = () => window.setLanguage('ru');
</script>
</body>
</html>
