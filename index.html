<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IVF-Spain Expert</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&display=swap');
        
        :root { 
            --ivf-navy: #002D45; 
            --ivf-gold: #D4AF37; 
        }
        
        * { box-sizing: border-box; }

        body { 
            font-family: 'Inter', sans-serif; 
            background-color: #f1f5f9; 
            margin: 0; 
            padding: 0; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            min-height: 100vh; 
        }
        
        .chat-container { 
            width: 100%; 
            height: 90vh; 
            max-height: 850px; 
            max-width: 500px; 
            background: white; 
            border-radius: 20px; 
            box-shadow: 0 0 40px rgba(0,0,0,0.15); 
            display: flex; 
            flex-direction: column; 
            overflow: hidden; 
            position: relative; 
        }

        @media (max-width: 500px) {
            .chat-container {
                height: 100vh;
                max-height: 100vh;
                border-radius: 0;
            }
        }

        .chat-header { 
            background: var(--ivf-navy); 
            padding: 16px 20px; 
            color: white; 
            border-bottom: 3px solid var(--ivf-gold); 
            display: flex; 
            align-items: center; 
            justify-content: space-between; 
            z-index: 10; 
            flex-shrink: 0; 
        }
        
        .header-left { display: flex; align-items: center; gap: 12px; }
        .logo-svg { width: 38px; height: 38px; flex-shrink: 0; }
        
        .lang-select { 
            background: rgba(255,255,255,0.1); 
            color: white; 
            border: 1px solid rgba(255,255,255,0.2); 
            border-radius: 6px; 
            padding: 4px; 
            font-size: 11px; 
            font-weight: 600; 
            cursor: pointer; 
            outline: none; 
        }
        .lang-select option { background: var(--ivf-navy); color: white; }

        .messages-area { 
            flex: 1 1 auto; 
            padding: 20px; 
            overflow-y: auto; 
            display: flex; 
            flex-direction: column; 
            gap: 16px; 
            background: #ffffff; 
            scroll-behavior: smooth; 
        }
        
        .message { max-width: 85%; padding: 14px 18px; border-radius: 18px; font-size: 14px; line-height: 1.7; word-wrap: break-word; position: relative; scroll-margin-top: 15px; }
        
        /* ОБНОВЛЕННЫЙ СТИЛЬ: ТЕКСТ БОТА ЧЕРНЫЙ, СРЕДНЕЙ ТОЛЩИНЫ (500) ДЛЯ ЛУЧШЕЙ ЧИТАБЕЛЬНОСТИ */
        .message-bot { 
            background: #f8fafc; 
            color: #000000; 
            font-weight: 500; 
            align-self: flex-start; 
            border-bottom-left-radius: 4px; 
            border: 1px solid #e2e8f0; 
        }
        
        .message-user { background: var(--ivf-navy); color: white; align-self: flex-end; border-bottom-right-radius: 4px; font-weight: 400; }
        
        .message a { color: #2563eb !important; text-decoration: underline !important; font-weight: 600; }
        .message-user a { color: var(--ivf-gold) !important; }

        #suggestions-container { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-top: 4px; width: 100%; padding-bottom: 10px; }
        .suggestion-btn { background: white; color: var(--ivf-navy); border: 1.5px solid var(--ivf-navy); padding: 8px 10px; border-radius: 10px; font-size: 11px; cursor: pointer; font-weight: 600; text-align: center; transition: 0.2s; }
        .suggestion-btn:hover { background: var(--ivf-gold); color: white; border-color: var(--ivf-gold); }

        .input-area { 
            padding: 14px 20px; 
            background: #f8fafc; 
            border-top: 1px solid #e2e8f0; 
            flex-shrink: 0; 
            width: 100%; 
        }
        .input-row { display: flex; gap: 8px; }
        input { flex: 1; padding: 12px; border: 2px solid #cbd5e1; border-radius: 12px; outline: none; font-size: 15px; }
        #send-btn { background: var(--ivf-navy); color: white; padding: 0 16px; border-radius: 12px; cursor: pointer; }
        
        /* ЗЕЛЕНЫЙ ИНДИКАТОР */
        #typing { display: none; padding: 4px 20px; font-size: 13px; color: #16a34a; font-weight: 700; flex-shrink: 0; }

        .error-box { background: #fee2e2; border: 1px solid #ef4444; color: #991b1b; padding: 12px; border-radius: 10px; font-size: 13px; margin-top: 10px; }

        /* КНОПКА СКОПИРОВАТЬ */
        .copy-btn { background: #f1f5f9; border: 1px solid #cbd5e1; color: #475569; font-size: 11px; cursor: pointer; margin-top: 15px; font-weight: 600; padding: 6px 12px; border-radius: 8px; transition: all 0.2s; width: fit-content; display: block; }
        .copy-btn:hover { background: #e2e8f0; color: var(--ivf-navy); }

        /* БЛОК ИСТОЧНИКОВ */
        .sources-block { background: #f8fafc; border: 1px solid #e2e8f0; color: #94a3b8; font-size: 9px; padding: 8px 12px; border-radius: 6px; margin-top: 12px; word-break: break-all; line-height: 1.4; font-family: monospace; }
    </style>
</head>

</div>

<script>
    // ======================================================================
    // 1. ЗАЩИТА КЛЮЧА
    // ======================================================================
    var keyPart1 = "AIzaSyBVxEYoymGh40_E"; 
    var keyPart2 = "TYm3a8jQ9GSGk9LAs_o";
    var apiKey = keyPart1 + keyPart2;
    
    // ======================================================================
    // 2. БЕЛЫЙ СПИСОК ИСТОЧНИКОВ (WHITELIST)
    // ======================================================================
    var whitelist = "ИСПАНИЯ: sanidad.gob.es, cnrha.sanidad.gob.es, sefertilidad.net, boe.es, ivf-spain.com, youtube.com/@IVFLife, aemps.gob.es, farmaceuticos.com. США: cdc.gov/art/, sart.org, asrm.org, fda.gov, usfertility.com, preludefertility.com, firstfertility.com, freedomfertility.com, mdrusa.com, cvsspecialty.com, resolve.org";

    var currentLang = 'en';

    var uiStrings = {
        en: { placeholder: "Your question...", typing: "Jenny is processing data...", welcome: "Hello. I am Jenny, your expert. Do you plan your first attempt or have experience?\n\nSUGGESTIONS: [First IVF attempt], [Previous failures], [Why Spain?], [Costs]", sources: "Sources:", copyBtn: "📋 Copy response", copied: "✅ Copied!" },
        es: { placeholder: "Tu pregunta...", typing: "Jenny está procesando los datos...", welcome: "Hola. Soy Jenny. ¿Planea su primer intento?\n\nSUGGESTIONS: [Primer intento], [Fallos anteriores], [¿Por qué España?], [Costes]", sources: "Fuentes:", copyBtn: "📋 Copiar respuesta", copied: "✅ ¡Copiado!" },
        fr: { placeholder: "Votre question...", typing: "Jenny traite les données...", welcome: "Bonjour. Je suis Jenny, votre experte. Prévoyez-vous votre première tentative ou avez-vous de l'expérience ?\n\nSUGGESTIONS: [Première tentative], [Échecs précédents], [Pourquoi l'Espagne ?], [Coûts]", sources: "Sources :", copyBtn: "📋 Copier la réponse", copied: "✅ Copié !" },
        it: { placeholder: "La tua domanda...", typing: "Jenny sta elaborando i dati...", welcome: "Ciao. Sono Jenny, la tua esperta. Stai pianificando il tuo primo tentativo o hai esperienza?\n\nSUGGESTIONS: [Primo tentativo], [Fallimenti precedenti], [Perché la Spagna?], [Costi]", sources: "Fonti:", copyBtn: "📋 Copia risposta", copied: "✅ Copiato!" },
        de: { placeholder: "Ihre Frage...", typing: "Jenny verarbeitet die Daten...", welcome: "Hallo. Ich bin Jenny, Ihre Expertin. Planen Sie Ihren ersten Versuch oder haben Sie Erfahrung?\n\nSUGGESTIONS: [Erster Versuch], [Bisherige Fehlschläge], [Warum Spanien?], [Kosten]", sources: "Quellen:", copyBtn: "📋 Antwort kopieren", copied: "✅ Kopiert!" },
        uk: { placeholder: "Ваше питання...", typing: "Дженні обробляє дані...", welcome: "Добрий день. Я Дженни. Ви плануєте першу спробу чи мали досвід?\n\nSUGGESTIONS: [Перша спроба], [Були невдачі], [Чому Іспанія?], [Вартість]", sources: "Джерела:", copyBtn: "📋 Скопіювати відповідь", copied: "✅ Скопійовано!" },
        ru: { placeholder: "Введите ваш вопрос...", typing: "Дженни обрабатывает данные...", welcome: "Здравствуйте. Я Дженни, ваш независимый эксперт по технологиям IVF-Spain. Вы планируете первую попытку ЭКО или у вас уже был опыт?\n\nSUGGESTIONS: [Первая попытка ЭКО], [Были неудачи], [Почему Испания?], [Узнать стоимость]", sources: "Источники:", copyBtn: "📋 Скопировать ответ", copied: "✅ Скопировано!" },

        pt: { placeholder: "Sua pergunta...", typing: "Jenny está processando os dados...", welcome: "Olá. Sou Jenny, sua especialista. Você planeja sua primera tentativa ou tem experiência?\n\nSUGGESTIONS: [Primeira tentativa], [Falhas anteriores], [Por que a Espanha?], [Custos]", sources: "Fontes:", copyBtn: "📋 Copiar resposta", copied: "✅ Copiado!" },

        ar: { placeholder: "سؤالك...", typing: "جيني تقوم بمعالجة البيانات...", welcome: "مرحباً. أنا جيني، خبيرتك. هل تخططين لمحاولتك الأولى أم لديك خبرة سابقة؟\n\nSUGGESTIONS: [المحاولة الأولى], [الإخفاقات السابقة], [لماذا إسبانيا؟], [التكاليف]", sources: "المصادر:", copyBtn: "📋 نسخ الرد", copied: "✅ تم النسخ!" },
        ja: { placeholder: "あなたの質問...", typing: "ジェニーがデータを処理しています...", welcome: "こんにちは。私はあなたの専門家、ジェニーです。初めての試みですか、それとも経験がありますか？\n\nSUGGESTIONS: [初めての体外受精], [過去の失敗], [なぜスペイン？], [費用]", sources: "ソース:", copyBtn: "📋 回答をコピー", copied: "✅ コピーしました！" }
    };

    function addMessage(text, isUser, isError) {
        var area = document.getElementById('messages-area');
        var oldSuggs = document.getElementById('suggestions-container');
        if (oldSuggs) oldSuggs.parentNode.removeChild(oldSuggs);

        var msgDiv = document.createElement('div');
        msgDiv.className = isError ? 'error-box' : ('message ' + (isUser ? 'message-user' : 'message-bot shadow-sm'));
        
        var displayBody = text;
        var suggests = [];
        var sourcesText = "";
        var currentLangStrings = uiStrings[currentLang] || uiStrings['en'];
        
        if (!isUser && !isError) {
            // Извлекаем Кнопки (SUGGESTIONS)
            var matchSugg = displayBody.match(/SUGGESTIONS:\s*([\s\S]*)/);
            if (matchSugg) {
                var suggString = matchSugg[1];
                var parts = suggString.split('[');
                for (var i = 1; i < parts.length; i++) {
                    var s = parts[i].split(']')[0];
                    if (s) suggests.push(s);
                }
                displayBody = displayBody.replace(/SUGGESTIONS:[\s\S]*/, '');
            }

            // Извлекаем Источники (SOURCES) и чистим их от длинных ссылок Google
            var matchSources = displayBody.match(/SOURCES:\s*([\s\S]*)/);
            if (matchSources) {
                sourcesText = matchSources[1].trim().replace(/\n/g, ' ').replace(/https?:\/\/[^\s]+/g, function(url) {
                    try { return new URL(url).hostname.replace('www.', ''); } catch(e) { return url; }
                });
                displayBody = displayBody.replace(/SOURCES:[\s\S]*/, '').trim();
            }
        }

        var textContainer = document.createElement('div');
        var formattedBody = displayBody.replace(/\n/g, '<br>');
        textContainer.innerHTML = formattedBody;
        msgDiv.appendChild(textContainer);
        
        // Блок ИСТОЧНИКОВ с мультиязычным заголовком
        if (!isUser && !isError && sourcesText) {
            var srcBlock = document.createElement('div');
            srcBlock.className = 'sources-block';
            srcBlock.innerHTML = '<strong style="color: #475569;">' + currentLangStrings.sources + '</strong> ' + sourcesText; 
            msgDiv.appendChild(srcBlock);
        }

        // КНОПКА КОПИРОВАНИЯ
        if (!isUser && !isError) {
            var copyBtn = document.createElement('button');
            copyBtn.className = 'copy-btn';
            copyBtn.innerHTML = currentLangStrings.copyBtn;
            copyBtn.onclick = function() {
                var textArea = document.createElement("textarea");
                textArea.value = displayBody + (sourcesText ? '\n\n' + currentLangStrings.sources + ' ' + sourcesText : '');
                document.body.appendChild(textArea);
                textArea.select();
                try {
                    document.execCommand('copy');
                    copyBtn.innerHTML = currentLangStrings.copied;
                    copyBtn.style.color = '#16a34a';
                    setTimeout(function() { 
                        copyBtn.innerHTML = currentLangStrings.copyBtn; 
                        copyBtn.style.color = '#475569'; 
                    }, 2500);
                } catch (err) {
                    console.error('Ошибка копирования', err);
                }
                document.body.removeChild(textArea);
            };
            msgDiv.appendChild(copyBtn);
        }

        area.appendChild(msgDiv);

        if (suggests.length > 0) {
            var suggDiv = document.createElement('div');
            suggDiv.id = 'suggestions-container';
            for (var k = 0; k < suggests.length; k++) {
                var btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.innerText = suggests[k];
                btn.onclick = (function(btnText) { return function() { document.getElementById('user-input').value = btnText; handleSend(); }; })(suggests[k]);
                suggDiv.appendChild(btn);
            }
            area.appendChild(suggDiv);
        }

        if (isUser) {
            msgDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
            var userMsgs = area.querySelectorAll('.message-user');
            if (userMsgs.length > 0) {
                userMsgs[userMsgs.length - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
    }

    async function callGemini(query) {
        var listUrl = "https://generativelanguage.googleapis.com/v1beta/models?key=" + apiKey;
        var listResponse = await fetch(listUrl);
        var listData = await listResponse.json();

        if (!listResponse.ok) {
            throw new Error("Ошибка ключа: " + (listData.error ? listData.error.message : "Не удалось связаться с сервером Google"));
        }

        var validModels = [];
        if (listData.models) {
            for (var i = 0; i < listData.models.length; i++) {
                var m = listData.models[i];
                if (m.supportedGenerationMethods && m.supportedGenerationMethods.indexOf('generateContent') !== -1) {
                    validModels.push(m);
                }
            }
        }

        if (validModels.length === 0) {
            throw new Error("Для этого ключа Google не выделил ни одной текстовой модели.");
        }

        var selectedModelName = validModels[0].name;
        for (var j = 0; j < validModels.length; j++) {
            if (validModels[j].name.indexOf("gemini-2.5-flash") !== -1 || validModels[j].name.indexOf("gemini-1.5-flash") !== -1) {
                selectedModelName = validModels[j].name;
                break;
            }
        }

        var url = "https://generativelanguage.googleapis.com/v1beta/" + selectedModelName + ":generateContent?key=" + apiKey;
        
        var sysInstruction = "Ты Дженни, независимый эксперт клиники IVF-Spain. Твоя аудитория - женщины, планирующие ЭКО. Отвечай эмпатично, сжато и не пугай их переизбытком медицинской терминологии.\nТВОЯ ЗАДАЧА: Искать информацию ТОЛЬКО на утвержденных сайтах.\nБЕЛЫЙ СПИСОК: " + whitelist + "\n\nСТРОГИЕ ПРАВИЛА:\n1. Обязательно используй встроенный поиск Google (site:).\n2. Понимай контекст: 'первая попытка' — это первая процедура лечения пациента, а не историческая справка (никогда не пиши про 1978 год и первого ребенка).\n3. Оперируй ТОЛЬКО найденными фактами.\n4. ВСЕГДА и ПРИ ЛЮБОМ ВОПРОСЕ проводи краткий сравнительный анализ между США и Испанией. Фокус сравнения должен подчеркивать возможности испанской медицины и IVF-Spain. НО если информации по какому-то критерию не хватает, просто НЕ УПОМИНАЙ его. КАТЕГОРИЧЕСКИ ЗАПРЕЩЕНО писать 'информация не найдена', 'невозможно сравнить' или 'нет данных'.\n5. БЕЗ ПРИВЕТСТВИЙ. Отвечай сразу по существу.\n6. ЗАПРЕЩЕНО использовать таблицы.\n7. ЗАПРЕЩЕНО давать ссылки на видео или YouTube. Только текст и источники.\n8. В конце ответа ОБЯЗАТЕЛЬНО задавай один вовлекающий вопрос клиенту. ВНИМАНИЕ: Этот вопрос ДОЛЖЕН ВСЕГДА плавно сводить тему к лечению в Испании или конкретно к преимуществам и услугам клиники IVF-Spain.\n9. ПОСЛЕ вопроса перечисли источники в одну строчку через пробел, начав новую строку строго со слова SOURCES:. Выводи ТОЛЬКО короткие имена доменов (например: ivf-spain.com, cdc.gov).\n10. СТРОГО на самой последней строке напиши 3-4 коротких варианта ответа НА ТВОЙ ВОПРОС (кнопки). Убедись, что текст на кнопках строго логически отвечает на вопрос, который ты задала в пункте 8! Формат: SUGGESTIONS: [Логичный ответ 1], [Логичный ответ 2], [Логичный ответ 3]\n\nЯзык ответа: " + currentLang + ".";

        var payload = {
            systemInstruction: { parts: [{ text: sysInstruction }] },
            contents: [{ parts: [{ text: query }] }],
            tools: [{ google_search: {} }] 
        };

        var response = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        
        var data = await response.json();

        if (!response.ok) {
            throw new Error(data.error ? data.error.message : "Технический сбой сервера");
        }
        
        if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
            return data.candidates[0].content.parts[0].text;
        } else {
            return "Извините, ответ не сформирован.";
        }
    }

    async function handleSend() {
        var input = document.getElementById('user-input');
        var val = input.value.trim();
        if (!val) return;

        addMessage(val, true);
        input.value = '';
        document.getElementById('typing').style.display = 'block';
        
        try {
            var reply = await callGemini(val);
            addMessage(reply);
        } catch (e) { 
            var friendlyError = e.message;
            if (e.message.includes("high demand") || e.message.includes("overloaded") || e.message.includes("429")) {
                friendlyError = "Сервер сейчас перегружен. Пожалуйста, подождите 10-15 секунд и попробуйте снова.";
            }
            if (e.message.includes("exceeded your current quota") || e.message.includes("Quota exceeded")) {
                friendlyError = "Сработал лимит Google для ключа. Пожалуйста, подождите ровно 1 минуту.";
            }
            addMessage("СИСТЕМНОЕ УВЕДОМЛЕНИЕ: " + friendlyError, false, true); 
        }
        document.getElementById('typing').style.display = 'none';
    }

    window.setLanguage = function(lang) {
        currentLang = lang;
        var s = uiStrings[lang] || uiStrings['en'];
        document.getElementById('user-input').placeholder = s.placeholder;
        document.getElementById('typing').innerText = s.typing; 
        document.getElementById('messages-area').innerHTML = '';
        document.getElementById('lang-select').value = lang;
        addMessage(s.welcome);
    };

    document.getElementById('send-btn').onclick = handleSend;
    document.getElementById('user-input').onkeypress = function(e) { if (e.key === 'Enter') handleSend(); };
    document.getElementById('lang-select').onchange = function(e) { window.setLanguage(e.target.value); };
    document.getElementById('restart-btn').onclick = function() { window.setLanguage(currentLang); };

    // По умолчанию всегда English
    window.onload = function() { window.setLanguage('en'); };
</script>
</body>
</html>
