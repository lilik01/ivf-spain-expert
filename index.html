    function addMessage(text, isUser, isError) {
        var area = document.getElementById('messages-area');
        var oldSuggs = document.getElementById('suggestions-container');
        if (oldSuggs) oldSuggs.parentNode.removeChild(oldSuggs);

        var msgDiv = document.createElement('div');
        msgDiv.className = isError ? 'error-box' : ('message ' + (isUser ? 'message-user' : 'message-bot shadow-sm'));
        
        var displayBody = text;
        var suggests = [];
        var ytIds = [];
        
        if (!isUser && !isError) {
            var matchSugg = text.match(/SUGGESTIONS:\s*([\s\S]*)/);
            if (matchSugg) {
                var suggString = matchSugg[1];
                var parts = suggString.split('[');
                for (var i = 1; i < parts.length; i++) {
                    var s = parts[i].split(']')[0];
                    if (s) suggests.push(s);
                }
                displayBody = text.replace(/SUGGESTIONS:[\s\S]*/, '');
            }

            var ytRegex = /(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})(?:[^\s<]*)/g;
            var match;
            while ((match = ytRegex.exec(displayBody)) !== null) {
                if (ytIds.indexOf(match[1]) === -1) {
                    ytIds.push(match[1]);
                }
            }
            ytIds = ytIds.slice(0, 2);

            displayBody = displayBody.replace(/(?:https?:\/\/)?(?:www\.)?(?:youtube\.com\/watch\?v=|youtu\.be\/)([a-zA-Z0-9_-]{11})(?:[^\s<]*)/g, '').trim();
        }

        var textContainer = document.createElement('div');
        textContainer.innerHTML = displayBody.replace(/\n/g, '<br>').replace(/(https?:\/\/[^\s]+)/g, '<a href="$1" target="_blank">$1</a>');
        msgDiv.appendChild(textContainer);
        
        if (!isUser && !isError && ytIds.length > 0) {
            var videoBlock = document.createElement('div');
            videoBlock.className = 'video-attachments';
            for (var j = 0; j < ytIds.length; j++) {
                var id = ytIds[j];
                var card = document.createElement('div');
                card.className = 'yt-card';
                card.innerHTML = '<div class="yt-thumb" style="background-image:url(\'https://img.youtube.com/vi/' + id + '/hqdefault.jpg\')"><div class="play-btn">▶</div></div><div class="p-2 text-[10px] text-gray-500 bg-gray-50 text-center font-bold">Видео-материал из базы</div>';
                card.onclick = (function(vid) { return function() { window.open('https://www.youtube.com/watch?v=' + vid, '_blank'); }; })(id);
                videoBlock.appendChild(card);
            }
            msgDiv.appendChild(videoBlock);
        }

        area.appendChild(msgDiv);

        if (suggests.length > 0) {
            var suggDiv = document.createElement('div');
            suggDiv.id = 'suggestions-container';
            for (var k = 0; k < suggests.length; k++) {
                var btn = document.createElement('button');
                btn.className = 'suggestion-btn';
                btn.innerText = suggests[k];
                btn.onclick = (function(btnText) { return function() { document.getElementById('user-input').value = btnText; handleSend(); }; })(suggests[k]);
                suggDiv.appendChild(btn);
            }
            area.appendChild(suggDiv);
        }

        if (isUser) {
            msgDiv.scrollIntoView({ behavior: 'smooth', block: 'start' });
        } else {
            var userMsgs = area.querySelectorAll('.message-user');
            if (userMsgs.length > 0) {
                userMsgs[userMsgs.length - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }
    }

    async function callGemini(query) {
        var listUrl = "https://generativelanguage.googleapis.com/v1beta/models?key=" + apiKey;
        var listResponse = await fetch(listUrl);
        var listData = await listResponse.json();

        if (!listResponse.ok) {
            throw new Error("Ошибка ключа: " + (listData.error ? listData.error.message : "Не удалось связаться с сервером Google"));
        }

        var validModels = [];
        if (listData.models) {
            for (var i = 0; i < listData.models.length; i++) {
                var m = listData.models[i];
                if (m.supportedGenerationMethods && m.supportedGenerationMethods.indexOf('generateContent') !== -1) {
                    validModels.push(m);
                }
            }
        }

        if (validModels.length === 0) {
            throw new Error("Для этого ключа Google не выделил ни одной текстовой модели.");
        }

        var selectedModelName = validModels[0].name;
        for (var j = 0; j < validModels.length; j++) {
            if (validModels[j].name.indexOf("gemini-1.5-flash") !== -1 || validModels[j].name.indexOf("gemini-2.5-flash") !== -1) {
                selectedModelName = validModels[j].name;
                break;
            }
        }

        var url = "https://generativelanguage.googleapis.com/v1beta/" + selectedModelName + ":generateContent?key=" + apiKey;
        
        var payload = {
            contents: [{ 
                parts: [{ 
                    text: "Ты Дженни, независимый эксперт клиники IVF-Spain.\nБАЗА ЗНАНИЙ: " + knowledgeBase + "\n\nСТРОГИЕ ПРАВИЛА:\n1. Оперируй ТОЛЬКО фактами из базы знаний.\n2. БЕЗ ПРИВЕТСТВИЙ. Отвечай сразу по существу.\n3. ЗАПРЕЩЕНО использовать таблицы.\n4. ЗАПРЕЩЕНО придумывать (галлюцинировать) ссылки или видео. В ответе давай ТОЛЬКО ссылки на источники, которые указаны в базе знаний.\n5. В конце каждого ответа ОБЯЗАТЕЛЬНО задавай один вовлекающий вопрос клиенту.\n6. СТРОГО на самой последней строке напиши 3-4 варианта ответа (кнопки) в таком формате: SUGGESTIONS: [Кнопка 1], [Кнопка 2], [Кнопка 3]\n\nЯзык ответа: " + currentLang + ".\nЗапрос: " + query 
                }] 
            }]
        };

        var response = await fetch(url, {
            method: 'POST',
            headers: {'Content-Type': 'application/json'},
            body: JSON.stringify(payload)
        });
        
        var data = await response.json();

        if (!response.ok) {
            throw new Error(data.error ? data.error.message : "Технический сбой сервера");
        }
        
        if (data && data.candidates && data.candidates[0] && data.candidates[0].content && data.candidates[0].content.parts && data.candidates[0].content.parts[0]) {
            return data.candidates[0].content.parts[0].text;
        } else {
            return "Извините, ответ не сформирован.";
        }
    }

    async function handleSend() {
        var input = document.getElementById('user-input');
        var val = input.value.trim();
        if (!val) return;

        addMessage(val, true);
        input.value = '';
        document.getElementById('typing').style.display = 'block';
        
        try {
            var reply = await callGemini(val);
            addMessage(reply);
        } catch (e) { 
            var friendlyError = e.message;
            if (e.message.includes("high demand") || e.message.includes("overloaded") || e.message.includes("429")) {
                friendlyError = "Сервер сейчас перегружен. Пожалуйста, подождите 10-15 секунд и попробуйте снова.";
            }
            if (e.message.includes("exceeded your current quota") || e.message.includes("Quota exceeded")) {
                friendlyError = "Сработал лимит Google для ключа. Пожалуйста, подождите ровно 1 минуту.";
            }
            addMessage("СИСТЕМНОЕ УВЕДОМЛЕНИЕ: " + friendlyError, false, true); 
        }
        document.getElementById('typing').style.display = 'none';
    }

    document.getElementById('admin-login-btn').onclick = function() {
        if (document.getElementById('admin-pass-input').value === "1324") {
            document.getElementById('password-modal').style.display = 'none';

            document.getElementById('kb-editor').value = knowledgeBase;

            alert("Неверный пароль!");
        }
    };

    document.getElementById('gen-code-btn').onclick = function() {
        var newKB = document.getElementById('kb-editor').value;
        var safeKB = newKB.replace(/\n/g, " ").replace(/"/g, "'");
        
        var clone = document.documentElement.cloneNode(true);
        
        var styles = clone.querySelectorAll('style');
        for (var i = 0; i < styles.length; i++) {
            if (styles[i].innerHTML.indexOf('--ivf-navy') === -1) {
                styles[i].parentNode.removeChild(styles[i]);
            }
        }
        
        var msgs = clone.querySelector('#messages-area');
        if (msgs) msgs.innerHTML = '';
        
        var ap = clone.querySelector('#admin-panel');
        if (ap) ap.style.display = 'none';
        
        var pm = clone.querySelector('#password-modal');
        if (pm) pm.style.display = 'none';
        
        var typ = clone.querySelector('#typing');
        if (typ) typ.style.display = 'none';
        
        var coc = clone.querySelector('#code-output-container');
        if (coc) {
            coc.classList.add('hidden');
            var co = clone.querySelector('#code-output');
            if (co) co.value = '';
        }
        
        var scripts = clone.querySelectorAll('script');
        for (var j = 0; j < scripts.length; j++) {
            if (scripts[j].innerHTML.indexOf('var knowledgeBase =') !== -1) {
                scripts[j].innerHTML = scripts[j].innerHTML.replace(/var knowledgeBase = "[\s\S]*?";/, 'var knowledgeBase = "' + safeKB + '";');
            }
        }
        
        var finalSource = "<!DOCTYPE html>\n" + clone.outerHTML;
        
        document.getElementById('code-output-container').classList.remove('hidden');
        document.getElementById('code-output').value = finalSource;
    };

    window.setLanguage = function(lang) {
        currentLang = lang;
        var s = uiStrings[lang] || uiStrings['en'];
        document.getElementById('user-input').placeholder = s.placeholder;
        document.getElementById('messages-area').innerHTML = '';
        addMessage(s.welcome);
    };

    document.getElementById('send-btn').onclick = handleSend;
    document.getElementById('user-input').onkeypress = function(e) { if (e.key === 'Enter') handleSend(); };
    document.getElementById('lang-select').onchange = function(e) { window.setLanguage(e.target.value); };
    document.getElementById('restart-btn').onclick = function() { window.setLanguage(currentLang); };

    window.onload = function() { window.setLanguage('en'); };
